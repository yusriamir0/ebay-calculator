<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantium Solutions Rate Calculator 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4)
    }

    h1 {
      color: #fff;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.5);
      font-size: .85rem;
      margin-bottom: 32px
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      font-size: .7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
      letter-spacing: .5px
    }

    label {
      display: block;
      color: rgba(255, 255, 255, 0.7);
      font-size: .8rem;
      font-weight: 500;
      margin-bottom: 6px;
      letter-spacing: .3px
    }

    select,
    input {
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: .95rem;
      padding: 13px 16px;
      outline: none;
      transition: .2s;
      margin-bottom: 20px
    }

    select:focus,
    input:focus {
      border-color: #7c3aed;
      background: rgba(124, 58, 237, 0.15);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2)
    }

    select option {
      background: #302b63;
      color: #fff
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px
    }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: .2s;
      letter-spacing: .3px;
      margin-top: 4px
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5)
    }

    .btn:active {
      transform: translateY(0)
    }

    .result {
      margin-top: 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      display: none
    }

    .result.show {
      display: block;
      animation: fadeIn .3s ease
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .result-title {
      color: rgba(255, 255, 255, 0.5);
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px
    }

    .rate-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07)
    }

    .rate-row:last-child {
      border-bottom: none
    }

    .rate-label {
      color: rgba(255, 255, 255, 0.65);
      font-size: .85rem
    }

    .rate-value {
      color: #fff;
      font-size: .95rem;
      font-weight: 600
    }

    .rate-value.highlight {
      color: #a78bfa;
      font-size: 1.1rem;
      font-weight: 700
    }

    .err {
      color: #f87171;
      font-size: .85rem;
      text-align: center;
      padding: 12px;
      background: rgba(248, 113, 113, 0.1);
      border-radius: 10px;
      margin-top: 16px;
      display: none
    }

    .err.show {
      display: block
    }

    .icon {
      margin-right: 6px
    }
  </style>
</head>

    }

    function calc() {
      const dest = document.getElementById('dest').value;
      const wRaw = parseInt(document.getElementById('weight').value);
      const err = document.getElementById('err');
      const res = document.getElementById('result');
      err.className = 'err'; res.className = 'result';

      if (!dest) { err.textContent = '⚠️ Please select a destination.'; err.className = 'err show'; return; }
      if (!wRaw || wRaw < 1) { err.textContent = '⚠️ Please enter a valid weight.'; err.className = 'err show'; return; }

      const w = snap(wRaw);
      const base = smart[dest]?.[w];
      const total = war[dest]?.[w];

      if (!base) { err.textContent = '⚠️ No rate available for this selection.'; err.className = 'err show'; return; }

      const surcharge = (base * 0.32).toFixed(2);
      document.getElementById('r-dest').textContent = labels[dest];
      document.getElementById('r-weight').textContent = w + 'g' + (wRaw !== w ? ' (rounded up from ' + wRaw + 'g)' : '');
      document.getElementById('r-base').textContent = 'RM ' + base.toFixed(2);
      document.getElementById('r-sur').textContent = 'RM ' + surcharge;
      document.getElementById('r-total').textContent = 'RM ' + (total || +(base + parseFloat(surcharge)).toFixed(2));
      res.className = 'result show';
    }

    document.getElementById('weight').addEventListener('keydown', e => { if (e.key === 'Enter') calc(); });
